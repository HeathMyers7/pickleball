<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Are We Pickling Today?</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #020617;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 25px 50px rgba(0,0,0,.5);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: #94a3b8;
    }

    .answer {
      margin: 32px 0 12px;
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .yes { color: #22c55e; }
    .no  { color: #ef4444; }

    .reason {
      font-size: 15px;
      color: #cbd5f5;
      margin-bottom: 28px;
    }

    .info {
      font-size: 14px;
      color: #cbd5f5;
      line-height: 1.5;
    }

    .info strong {
      color: #e5e7eb;
      font-weight: 600;
    }

    a {
      color: #60a5fa;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 26px;
      font-size: 12px;
      color: #64748b;
    }

    /* Hidden admin hotspot */
    #adminHotspot {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 20px;
      height: 20px;
      opacity: 0.06;
      cursor: pointer;
      user-select: none;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Are We Pickling Today?</h1>
    <div class="subtitle">Pickleball • 4–6pm</div>

    <div id="answer" class="answer">…</div>
    <div id="reason" class="reason">Checking…</div>

    <div class="info">
      <div><strong>Location:</strong> 7600 Bevelhymer Rd, New Albany</div>
      <div><strong>Equipment:</strong> None needed</div>
      <div>
        <strong>Rules:</strong>
        <a href="https://www.youtube.com/watch?v=pDDwZgepQeE" target="_blank">
          Watch video
        </a>
      </div>
    </div>

    <div class="footer" id="updated"></div>
  </div>

  <div id="adminHotspot">🥒</div>

<script>
(() => {
  const answerEl  = document.getElementById("answer");
  const reasonEl  = document.getElementById("reason");
  const updatedEl = document.getElementById("updated");

  const LS_FLIP = "pickling_override_flip";
  const ADMIN_PASSWORD_SHA256 =
    "de6b1f6d5fdbf9b5be0fca1436cf7a1bc88b7b6ce1a25c1a6b0fbe1c3db0f8d0";

  function setAnswer(isYes, reason) {
    answerEl.textContent = isYes ? "YES" : "NO";
    answerEl.className = "answer " + (isYes ? "yes" : "no");
    reasonEl.textContent = reason;
    updatedEl.textContent = "Last updated: " + new Date().toLocaleString();
  }

  function getOverride() {
    return localStorage.getItem(LS_FLIP) === "true";
  }

  function toggleOverride() {
    localStorage.setItem(LS_FLIP, !getOverride());
    init();
  }

  async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return [...new Uint8Array(hash)].map(b => b.toString(16).padStart(2, "0")).join("");
  }

  async function openAdmin() {
    const pw = prompt("Admin password:");
    if (!pw) return;
    if (await sha256(pw) === ADMIN_PASSWORD_SHA256) toggleOverride();
    else alert("Incorrect password");
  }

  // Triple-click hidden hotspot
  let clicks = 0;
  document.getElementById("adminHotspot").addEventListener("click", () => {
    clicks++;
    setTimeout(() => clicks = 0, 800);
    if (clicks >= 3) openAdmin();
  });

  // --- SIMPLIFIED DECISION ---
  async function init() {
    const today = new Date();
    const isTuesday = today.getDay() === 2;

    // Default answer if not Tuesday
    let yes = isTuesday;
    let reason = isTuesday
      ? "Looks good for pickleball."
      : "Not a scheduled pickleball day.";

    // Apply override flip if active
    if (getOverride()) yes = !yes;

    setAnswer(yes, reason);
  }

  init();
})();
</script>
</body>
</html>
