<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Are We Pickling Today?</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f1f5f9;
      color: #0f172a;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      text-align: center;
      padding: 24px;
    }

    .card {
      max-width: 520px;
      width: 100%;
      background: #ffffff;
      border-radius: 20px;
      padding: 36px 28px;
      box-shadow: 0 20px 40px rgba(15,23,42,.12);
    }

    h1 {
      margin: 0;
      font-size: 28px;
      font-weight: 700;
      color: #0f172a;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      color: #475569;
    }

    .answer {
      margin: 32px 0 12px;
      font-size: 96px;
      font-weight: 900;
      letter-spacing: -0.05em;
    }

    .yes { color: #16a34a; }
    .no  { color: #dc2626; }

    .reason {
      font-size: 15px;
      color: #334155;
      margin-bottom: 26px;
    }

    .info {
      font-size: 14px;
      color: #334155;
      line-height: 1.6;
    }

    .info strong {
      color: #0f172a;
      font-weight: 600;
    }

    a {
      color: #2563eb;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .footer {
      margin-top: 22px;
      font-size: 12px;
      color: #64748b;
    }

    /* Discreet admin control */
    #adminControl {
      position: fixed;
      bottom: 10px;
      right: 10px;
      width: 18px;
      height: 18px;
      opacity: 0.06;
      cursor: pointer;
      user-select: none;
    }

    #adminControl:hover {
      opacity: 0.25;
    }
  </style>
</head>
<body>

  <div class="card">
    <h1>Are We Pickling Today?</h1>
    <div class="subtitle">Pickleball • 4–6pm</div>

    <div id="answer" class="answer">…</div>
    <div id="reason" class="reason">Checking…</div>

    <div class="info">
      <div><strong>Location:</strong> 7600 Bevelhymer Rd, New Albany</div>
      <div><strong>Equipment:</strong> None needed</div>
      <div>
        <strong>Rules:</strong>
        <a href="https://www.youtube.com/watch?v=pDDwZgepQeE" target="_blank">
          Watch video
        </a>
      </div>
    </div>

    <div id="updated" class="footer"></div>
  </div>

  <!-- Discreet admin toggle -->
  <div id="adminControl" title="">⚙️</div>

<script>
(() => {
  const answerEl  = document.getElementById("answer");
  const reasonEl  = document.getElementById("reason");
  const updatedEl = document.getElementById("updated");
  const adminEl   = document.getElementById("adminControl");

  const LS_OVERRIDE = "pickleball_override";

  // SHA-256 hash of admin password (default: PickleTime!)
  const ADMIN_PASSWORD_SHA256 =
    "de6b1f6d5fdbf9b5be0fca1436cf7a1bc88b7b6ce1a25c1a6b0fbe1c3db0f8d0";

  function getOverride() {
    const v = localStorage.getItem(LS_OVERRIDE);
    return v === "YES" || v === "NO" ? v : null;
  }

  function setOverride(val) {
    if (val) localStorage.setItem(LS_OVERRIDE, val);
    else localStorage.removeItem(LS_OVERRIDE);
  }

  function updateDisplay(result, reason) {
    answerEl.textContent = result;
    answerEl.className = "answer " + (result === "YES" ? "yes" : "no");
    reasonEl.textContent = reason;
    updatedEl.textContent = "Last updated: " + new Date().toLocaleString();
  }

  async function sha256(text) {
    const data = new TextEncoder().encode(text);
    const hash = await crypto.subtle.digest("SHA-256", data);
    return [...new Uint8Array(hash)]
      .map(b => b.toString(16).padStart(2, "0"))
      .join("");
  }

  async function openAdmin() {
    const pw = prompt("Admin password:");
    if (!pw) return;

    if (await sha256(pw) !== ADMIN_PASSWORD_SHA256) {
      alert("Incorrect password");
      return;
    }

    const current = getOverride();
    const next = current === "YES" ? "NO" : "YES";
    setOverride(next);
    init();
  }

  /* Double-click */
  adminEl.addEventListener("dblclick", openAdmin);

  /* Long-press (mobile) */
  let pressTimer;
  adminEl.addEventListener("mousedown", () => {
    pressTimer = setTimeout(openAdmin, 1500);
  });
  adminEl.addEventListener("mouseup", () => clearTimeout(pressTimer));
  adminEl.addEventListener("mouseleave", () => clearTimeout(pressTimer));

  function init() {
    const today = new Date();
    const isTuesday = today.getDay() === 2;

    let result = isTuesday ? "YES" : "NO";
    let reason = isTuesday
      ? "Looks good for pickleball."
      : "Not a scheduled pickleball day.";

    const override = getOverride();
    if (override) {
      result = override;
      reason = "Result manually set.";
    }

    updateDisplay(result, reason);
  }

  init();
})();
</script>

</body>
</html>
